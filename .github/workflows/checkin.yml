name: Get Subscription Weekly

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  execute-script:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip3 install pyYAML requests
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Install tqdm
      run: |
        pip install tqdm

    - name: Collect Subscribe
      id: collect
      run: |
        cd aggregate
        python -u subscribe/collect.py -s
      
    - name: Create/Update Gist
      env:
        GH_TOKEN: ${{ secrets.PAT}}
      run: |
        cd aggregate/data
        gh gist edit ${{ secrets.GIST_ID }} --add "subscribes.txt"
        gh gist edit ${{ secrets.GIST_ID }} --add "domains.txt"
        gh gist edit ${{ secrets.GIST_ID }} --add "valid-domains.txt"

    - name: Update Gist with Proxies
      env:
        GH_TOKEN: ${{ secrets.PAT}}
        GIST_ID: ${{ secrets.GIST_ID }}
      run: |
        cd aggregate/data
        FILE_NAME=proxies.yaml
        FILE_CONTENT=$(cat $FILE_NAME)

        curl -X PATCH \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/gists/$GIST_ID \
          -d '{
            "files": {
              "'"$FILE_NAME"'": {
                "content": "'"$FILE_CONTENT"'"
              }
            }
          }'
